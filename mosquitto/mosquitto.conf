# Mosquitto broker configuration using the built-in dynamic security plugin.
# This file is used by the Docker container; it is NOT for direct host use.

# Plain MQTT listener (default for local-network plugs)
listener 1883
allow_anonymous false

# Optional TLS listener - enabled by setting MQTT_TLS=true in .env
# listener 8883
# cafile /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key

# Persist sessions and messages across broker restarts
persistence true
persistence_location /mosquitto/data/

# Log to stdout for Docker log aggregation
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Built-in dynamic security plugin - manages clients/roles/ACLs at runtime
# via $DYNSEC/commands MQTT topic. Bootstrapped by docker-entrypoint.sh.
plugin /usr/lib/mosquitto_dynamic_security.so
plugin_opt_config_file /mosquitto/data/dynamic-security.json
